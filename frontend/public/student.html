<!doctype html>
<html lang="ru">
<head>
  <script>
  (function() {
    try {
      // Применяем тему до загрузки страницы
      var theme = localStorage.getItem('kemgu_theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      
      // Добавляем класс, который убирает переходы на время загрузки
      document.documentElement.classList.add('no-transition');
      
      // Убираем класс после загрузки, чтобы вернуть плавность
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.documentElement.classList.remove('no-transition');
        }, 100);
      });
    } catch (e) {}
  })();
</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>КемГУ — Студент</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="logo">КG</div>
      <div class="header-title">
        <h2>КемГУ — Студент</h2>
        <div class="small" id="studentName">Загрузка...</div>
      </div>
      
      <div class="right-header-controls">
        <div class="theme-area">
          <button id="themeToggle" class="theme-toggle-btn">🎨</button>
        </div>
        
        <div class="profile-trigger-area">
          <div id="profileTrigger" class="profile-trigger-btn" aria-label="Мой профиль">
            <div id="profileAvatarMini" class="profile-avatar-mini">
              <span id="avatarInitials">S</span>
              <img id="avatarImage" src="" alt="Avatar" style="display:none;" />
            </div>
            <span>Профиль</span>
          </div>
          
          <div id="profileMenu" class="kg-profile-menu">
            <div class="profile-menu-item" onclick="window.location.href='profile.html'">⚙️ Настройки</div>
            <div class="profile-menu-item profile-menu-logout" onclick="window.handleLogout()">🚪 Выход</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="logo">КG</div>
        <h3>Навигация</h3>
      </div>
      <nav class="nav">
        <a href="student.html" class="active">📚 Мои задания</a>
        <a href="lecture.html">📖 Лекции</a>
        <a href="assignment.html">📝 Мои работы</a>
      </nav>
    </aside>

    <main class="main">
      <div class="card">
        <h1 class="h1-shimmer">Мои задания</h1>
        <div id="assignmentsList" class="grid"></div>
      </div>
    </main>

    <aside class="rightbar">
      <div class="card">
        <h3>Информация</h3>
        <div class="small" id="studentInfo"></div>
      </div>
    </aside>
  </div>

  <!-- Submit Work Modal -->
  <div id="submitModal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2>Отправка работы</h2>
      <form id="submitForm">
        <input type="hidden" id="submitAssignmentId" />
        
        <div class="form-group">
          <label for="workTitle">Название работы *</label>
          <input id="workTitle" type="text" placeholder="Например: Лаба2-Знакомство с ОС" required title="Название работы" aria-label="Название вашей работы" />
        </div>
        
        <div class="form-group">
          <label for="submitFiles">Файлы (можно несколько)</label>
          <input id="submitFiles" type="file" accept=".pdf,.doc,.docx,.zip,.rar" multiple onchange="updateFilesDisplay()" required title="Выберите файл для отправки" aria-label="Выберите один или несколько файлов" />
          <div class="small" style="margin-top: 5px; opacity: 0.7;">Поддерживаются: PDF, DOC, DOCX, ZIP, RAR</div>
          <div id="filesPreview" class="submission-files-list"></div>
        </div>
        
        <div class="form-group">
          <label for="submitComment">Комментарий к работе (Необязательно)</label>
          <textarea id="submitComment" rows="3" placeholder="Описание вашей работы..."></textarea>
        </div>
        
        <div class="form-actions">
          <button class="btn" type="submit">Отправить на проверку</button>
          <button type="button" class="btn-ghost modal-close">Отмена</button>
        </div>
      </form>
    </div>
  </div>

 <!-- Footer with Waves -->
<footer id="site-footer" class="kg-footer" role="contentinfo">
  <div class="kg-footer-inner">
    <div class="kg-footer-brand">© КемГУ — Образовательный портал</div>
  </div>

  <div class="kg-waves" aria-hidden="true">
    <!-- Используем один реиспользуемый path и несколько <use> с разными смещениями -->
    <svg class="kg-waves-svg" viewBox="0 24 150 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="gentle-wave"
              d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z" />
      </defs>

      <g class="wave-parallax">
        <use xlink:href="#gentle-wave" class="wave wave1" x="48" y="0" />
        <use xlink:href="#gentle-wave" class="wave wave2" x="48" y="3" />
        <use xlink:href="#gentle-wave" class="wave wave3" x="48" y="5" />
      </g>
    </svg>
  </div>
</footer>

  <script src="assets/js/loader.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    // Мгновенная проверка авторизации до загрузки страницы
    (function() {
      const token = localStorage.getItem('kemgu_token');
      if (!token) {
        console.log('[STUDENT PROTECT] No token, redirecting...');
        window.location.href = 'index.html';
      } else {
        try {
          const payload = JSON.parse(atob(token.split('.')[1]));
          console.log('[STUDENT PROTECT] Token decoded:', payload);
          if (payload.role !== 'student') {
            console.log('[STUDENT PROTECT] Wrong role, redirecting...');
            window.location.href = 'index.html';
          }
        } catch (e) {
          console.error('[STUDENT PROTECT] Invalid token:', e);
          window.location.href = 'index.html';
        }
      }
    })();
  </script>
  <script src="assets/js/student.js"></script>
</body>
</html>
