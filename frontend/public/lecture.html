<!doctype html>
<html lang="ru">
<head>
  <script>
  (function() {
    try {
      // Применяем тему до загрузки страницы
      var theme = localStorage.getItem('kemgu_theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      
      // Добавляем класс, который убирает переходы на время загрузки
      document.documentElement.classList.add('no-transition');
      
      // Убираем класс после загрузки, чтобы вернуть плавность
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.documentElement.classList.remove('no-transition');
        }, 100);
      });
    } catch (e) {}
  })();
</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>КемГУ — Лекции</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="logo">КG</div>
      <div class="header-title">
        <h2>КемГУ — Лекции</h2>
        <div class="small" id="userNameDisplay">Загрузка...</div>
      </div>
      
      <div class="right-header-controls">
        <div class="theme-area">
          <button id="themeToggle" class="theme-toggle-btn">🎨</button>
        </div>
        
        <div class="profile-trigger-area">
          <div id="profileTrigger" class="profile-trigger-btn" aria-label="Мой профиль">
            <div id="profileAvatarMini" class="profile-avatar-mini">
              <span id="avatarInitials">U</span>
              <img id="avatarImage" src="" alt="Avatar" style="display:none;" />
            </div>
            <span>Профиль</span>
          </div>
          
          <div id="profileMenu" class="kg-profile-menu">
            <div class="profile-menu-item" onclick="window.location.href='profile.html'">⚙️ Настройки</div>
            <div class="profile-menu-item profile-menu-logout" onclick="window.handleLogout()">🚪 Выход</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="page-content">
    <div class="card">
      <h1 class="h1-shimmer">Лекции</h1>
      <div class="lecture-actions">
        <a href="resources.html" class="btn btn-ghost">📖 Учебные материалы</a>
      </div>
      <div id="lecturesList" class="grid"></div>
    </div>
  </div>

 <!-- Footer with Waves -->
<footer id="site-footer" class="kg-footer" role="contentinfo">
  <div class="kg-footer-inner">
    <div class="kg-footer-brand">© КемГУ — Образовательный портал</div>
  </div>

  <div class="kg-waves" aria-hidden="true">
    <!-- Используем один реиспользуемый path и несколько <use> с разными смещениями -->
    <svg class="kg-waves-svg" viewBox="0 24 150 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="gentle-wave"
              d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z" />
      </defs>

      <g class="wave-parallax">
        <use xlink:href="#gentle-wave" class="wave wave1" x="48" y="0" />
        <use xlink:href="#gentle-wave" class="wave wave2" x="48" y="3" />
        <use xlink:href="#gentle-wave" class="wave wave3" x="48" y="5" />
      </g>
    </svg>
  </div>
</footer>

  <script src="assets/js/loader.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/lecture.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const session = window.getSession?.();
      if (session?.data) {
        // Отображаем имя
        const nameDisplay = document.getElementById('userNameDisplay');
        if (nameDisplay) nameDisplay.textContent = session.data.name || 'Гость';
        
        // Обновляем аватар
        const avatarInitials = document.getElementById('avatarInitials');
        const avatarImage = document.getElementById('avatarImage');
        
        if (session.data.photo) {
          avatarImage.src = session.data.photo;
          avatarImage.style.display = 'block';
          avatarInitials.style.display = 'none';
        } else if (session.data.name) {
          const initials = session.data.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
          avatarInitials.textContent = initials || 'U';
          avatarInitials.style.display = 'flex';
          avatarImage.style.display = 'none';
        }
      }
    });
  </script>
</body>
</html>
